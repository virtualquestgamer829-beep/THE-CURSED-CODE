<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Cursed Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blood: #8b0000;
      --neon-red: #ff1a1a;
      --dark: #0a0000;
      --mid: #1a0000;
      --glow: #ff0000;
    }

    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
      background: var(--dark);
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 70% 40%, rgba(160,0,0,0.55) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(100,0,0,0.4) 0%, transparent 50%),
        linear-gradient(160deg, #0a0000 0%, #1a0000 40%, #2a0000 70%, #0d0000 100%);
    }

    /* Dark corridor silhouette */
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to right, rgba(0,0,0,0.7) 0%, transparent 18%, transparent 78%, rgba(0,0,0,0.7) 100%),
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 28px,
          rgba(0,0,0,0.15) 28px, rgba(0,0,0,0.15) 30px
        );
    }

    /* Grain / noise overlay */
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.25;
      pointer-events: none;
    }

    /* ── BLOOD DRIPS ── */
    .drips {
      position: fixed; top: 0; left: 0; right: 0;
      height: 120px; z-index: 1; pointer-events: none;
      display: flex; gap: 0;
    }
    .drip {
      width: 3px;
      background: linear-gradient(to bottom, var(--blood), transparent);
      border-radius: 0 0 50% 50%;
      animation: drip-fall linear infinite;
      margin: 0 18px;
      opacity: 0.7;
    }
    @keyframes drip-fall {
      0%   { height: 0px; opacity: 0.8; }
      60%  { height: 80px; opacity: 0.6; }
      100% { height: 110px; opacity: 0; }
    }

    /* ── FLOATING PARTICLES ── */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--blood);
      border-radius: 50%;
      animation: float-up linear infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    /* ── MAIN LAYOUT ── */
    .wrapper {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 60px;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Special Elite', cursive;
      font-size: clamp(2.8rem, 7vw, 6rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--neon-red);
      text-shadow:
        0 0 8px var(--glow),
        0 0 20px var(--glow),
        0 0 50px rgba(255,0,0,0.5),
        0 0 100px rgba(180,0,0,0.3);
      animation: flicker 4s infinite;
      margin-bottom: 50px;
      user-select: none;
    }
    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% {
        text-shadow:
          0 0 8px var(--glow),
          0 0 20px var(--glow),
          0 0 50px rgba(255,0,0,0.5),
          0 0 100px rgba(180,0,0,0.3);
        opacity: 1;
      }
      20%,24%,55% {
        text-shadow: none;
        opacity: 0.6;
      }
    }

    /* ── DOWNLOAD BUTTON ── */
    .center-area {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1;
      padding-bottom: 40px;
    }

    .dl-btn {
      position: relative;
      font-family: 'Special Elite', cursive;
      font-size: clamp(1.1rem, 2.8vw, 1.6rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      padding: 22px 60px;
      border: 2px solid var(--blood);
      background: rgba(0,0,0,0.6);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s, color 0.2s;
      text-shadow: 0 0 8px rgba(255,0,0,0.6);
    }

    /* blood fill on hover */
    .dl-btn::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0;
      background: linear-gradient(to top, #6b0000, #a00000, #cc0000);
      transition: height 0.4s ease;
      z-index: 0;
    }
    .dl-btn:hover::before { height: 100%; }
    .dl-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 30px rgba(180,0,0,0.7), 0 0 60px rgba(120,0,0,0.4);
      border-color: #cc0000;
    }
    .dl-btn:active { transform: scale(0.98); }

    .dl-btn span { position: relative; z-index: 1; }

    /* drip from button top */
    .dl-btn::after {
      content: '';
      position: absolute;
      top: -1px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 0;
      background: linear-gradient(to bottom, #cc0000, transparent);
      border-radius: 0 0 50% 50%;
      animation: btn-drip 3s ease-in-out infinite;
    }
    @keyframes btn-drip {
      0%,40%  { height: 0; opacity: 0; }
      60%     { height: 28px; opacity: 0.9; }
      100%    { height: 40px; opacity: 0; }
    }

    .dl-label {
      margin-top: 22px;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      letter-spacing: 0.25em;
      color: rgba(220, 50, 50, 0.85);
      text-shadow: 0 0 12px rgba(200,0,0,0.5);
      animation: pulse-label 2.5s ease-in-out infinite;
      user-select: none;
    }
    @keyframes pulse-label {
      0%,100% { opacity: 0.7; }
      50%     { opacity: 1; text-shadow: 0 0 20px rgba(255,30,30,0.8); }
    }

    /* ── BOTTOM TAGLINE ── */
    .tagline {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(180,0,0,0.5);
      text-transform: uppercase;
      user-select: none;
    }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 20; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed; inset: 0; z-index: 15; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    }

    /* Cursor crosshair */
    body { cursor: crosshair; }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Blood drips -->
  <div class="drips" id="drips"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Scanlines + Vignette -->
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Main content -->
  <div class="wrapper">
    <h1 class="title">THE&nbsp; CURSED&nbsp; CODE</h1>

    <div class="center-area">
      <a href="#" class="dl-btn"><span>⬇ &nbsp;Download &nbsp;Game&nbsp; ⬇</span></a>
      <p class="dl-label">khelo gaa 💀</p>
    </div>
  </div>

  <p class="tagline">© 2026 &nbsp;·&nbsp; The Cursed Code &nbsp;·&nbsp; All rights reserved</p>

  <script>
    // Generate drips
    const dripsEl = document.getElementById('drips');
    for (let i = 0; i < 28; i++) {
      const d = document.createElement('div');
      d.className = 'drip';
      d.style.animationDuration = (2.5 + Math.random() * 4) + 's';
      d.style.animationDelay    = (Math.random() * 5) + 's';
      d.style.opacity           = (0.3 + Math.random() * 0.5).toString();
      dripsEl.appendChild(d);
    }

    // Generate floating particles
    const partEl = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left              = Math.random() * 100 + 'vw';
      p.style.width             = (2 + Math.random() * 3) + 'px';
      p.style.height            = p.style.width;
      p.style.animationDuration = (6 + Math.random() * 12) + 's';
      p.style.animationDelay    = (Math.random() * 10) + 's';
      partEl.appendChild(p);
    }

    // Occasional screen flicker
    setInterval(() => {
      if (Math.random() < 0.15) {
        document.body.style.filter = 'brightness(0.7)';
        setTimeout(() => document.body.style.filter = '', 60 + Math.random() * 80);
      }
    }, 3000);
  </script>
</body>
</html>
